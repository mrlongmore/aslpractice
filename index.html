<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <div id = "name-modal" class = "modal">
            <div class = "modal-header">
                <h1>What is your name?</h1>
            </div>
            <div class = "input-area">
                <input type = "text">
                <button id = "name-button">Submit</button>
            </div>
        </div>
        <div id = "topic-modal" class = "modal">
            <div class = "modal-header">
                <h1>Which topic(s) would you like to practice?</h1>
            </div>
            <div id = "topic-container">
                <!--Topics populate here-->
            </div>
        </div>
        <div id = "quiz-modal" class = "modal">
            <div id = "gif-modal">
                <!--Gif populates here-->
            </div>
            <div id = "answers-area">
                <!--Answers populate here-->
            </div>
        </div>
        <div id = "certificate-modal" class = modal>
            <div class = "modal-header">
                <h1>Great work, name!</h1>
            </div>
            <div id = "result-area">
                <h2>Your score is: x</h2>
                <p>Take a screenshot of your results and upload them to Google Classroom!</p>
            </div>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
