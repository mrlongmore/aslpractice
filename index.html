<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name = "keywords" content = "ASL, American Sign Language, Sign Language, Learning, Practice, Quiz">
        <meta name = "author" content = "Harrison Longmore">
        <title>ASL Anchor</title>
        <link rel = "stylesheet" href = "style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id = "name-modal" class = "modal">
            <div class = "modal-header">
                <h1>What is your name?</h1>
            </div>
            <div class = "input-area">
                <input id="name-input" type = "text" placeholder="Your name here">
                <button id = "name-button">Submit</button>
            </div>
        </div>
        <div id = "topic-modal" class = "modal">
            <div class = "modal-header">
                <h1>Which topic(s) would you like to practice?</h1>
            </div>
            <div id = "topic-container">
                <!--Topics populate here-->
            </div>
            <button id = "topic-button">Submit</button>
        </div>
        <div id = "quiz-modal" class = "modal">
            <div class = "questions-remaining">
                <!--Questions remaining populates here-->
            </div>
            <div class = "modal-header">
                <h1>Identify the following sign:</h1>
            </div>
            <div id = "gif-modal">
                <!--Gif populates here-->
            </div>
            <div id = "answers-area">
                <!--Answers populate here-->
            </div>
        </div>
        <div id = "certificate-modal" class = "modal">
            <div id = "certificate-header" class = "modal-header">
                <!--Certificate header populates here-->
            </div>
            <div id = "result-area">
                <!--Results populate here-->
            </div>
            <button id = "certificate-button">Want to practice a different topic?</button>
        </div>
        /*<div id = "mini-game">
            <canvas></canvas>
        </div>*/
        <script src = "script.js"></script>
    </body>
</html>
