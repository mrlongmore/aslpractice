<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumper Quiz Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
                body {
            font-family: 'Press+Start+2P', cursive;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        #game-container {
            position: relative;
            border: 4px solid #60a5fa; /* Blue theme */
            border-radius: 8px;
            box-shadow: 0 0 20px #60a5fa;
            background: #0c1425; /* Deep blue background */
            width: min(800px, calc(100vw - 24px));
            height: min(600px, calc(100vh - 24px));
            max-width: calc(100vw - 24px);
            max-height: calc(100vh - 24px);
            overflow: hidden;
        }

        @media (max-width: 480px) {
            #game-container {
                width: 100%;
                height: 100%; /* allow room for mobile UI chrome */
            }
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 1.25rem;
            color: #60a5fa;
            text-shadow: 2px 2px #000;
        }
        #quiz-button {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            margin-top: 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px #d97706; /* Darker yellow */
            font-family: 'Press Start 2P', cursive;
        }
        #quiz-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #d97706;
        }
        /* Shared Modal Styles */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            background-color: rgba(12, 20, 37, 0.95);
            border: 4px solid #60a5fa;
            border-radius: 12px;
            box-shadow: 0 0 30px #60a5fa, 0 0 50px #60a5fa inset;
            color: #ffffff;
            z-index: 10;
            transition: all 0.3s ease-in-out;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }
        .modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        .modal button {
            transition: all 0.2s ease;
            box-shadow: 0 4px #1e40af; /* Darker blue */
        }
        .modal button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #1e40af;
        }
         #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8);
            color: #60a5fa;
            padding: 2rem 3rem;
            border-radius: 1rem;
            border: 2px solid #60a5fa;
            text-align: center;
            z-index: 20;
            font-size: 1.5rem;
        }

        #mobile-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(96, 165, 250, 0.7);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.45);
            z-index: 25;
            pointer-events: none;
        }

        #mobile-hint.hidden {
            display: none;
        }
        /* Custom Scrollbar Styles */
        #topic-buttons::-webkit-scrollbar {
            width: 12px;
        }
        #topic-buttons::-webkit-scrollbar-track {
            background: #0c1425;
            border-radius: 10px;
        }
        #topic-buttons::-webkit-scrollbar-thumb {
            background-color: #60a5fa;
            border-radius: 10px;
            border: 2px solid #0c1425;
        }
        #topic-buttons::-webkit-scrollbar-thumb:hover {
            background-color: #93c5fd;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-container">
            <div id="jumps-display">Jumps: 3</div>
            <div id="level-display">Level: 1</div>
            <button id="quiz-button" class="mt-4 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg text-sm">
                Get Jumps
            </button>
        </div>

        <!-- Topic Selection Modal -->
        <div id="topic-modal" class="modal w-11/12 max-w-sm p-6 rounded-lg text-center">
            <h2 class="text-2xl md:text-3xl mb-6 text-blue-300">Choose a Topic!</h2>
            <div id="topic-buttons" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-2">
                <!-- Topic buttons will be injected by JS -->
            </div>
        </div>

        <!-- GIF Quiz Modal -->
        <div id="gif-modal" class="modal w-11/12 max-w-md p-6 rounded-lg text-center">
            <h2 class="text-xl md:text-2xl mb-4 text-blue-400" id="gif-question">What is this?</h2>
            <img id="gif-image" src="" alt="Challenge GIF" class="w-full h-48 object-contain mx-auto mb-6 rounded-md border-2 border-blue-400">
            <div class="grid grid-cols-2 gap-4">
                <button id="option0" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option1" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option2" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option3" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
            </div>
        </div>
        <div id="message-box" class="hidden">
            <p id="message-text"></p>
        </div>
    </div>

    <script>
        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gifModal = document.getElementById('gif-modal');
        const topicModal = document.getElementById('topic-modal');
        const topicButtonsContainer = document.getElementById('topic-buttons');
        const gifImage = document.getElementById('gif-image');
        const gifQuestion = document.getElementById('gif-question');
        const optionBtns = [
            document.getElementById('option0'), document.getElementById('option1'),
            document.getElementById('option2'), document.getElementById('option3'),
        ];
        const jumpsDisplay = document.getElementById('jumps-display');
        const levelDisplay = document.getElementById('level-display');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');
        const quizButton = document.getElementById('quiz-button');

        // --- Game Constants ---
        const GRAVITY = 0.5;
        const JUMP_POWER = 15;
        const ARROW_LENGTH = 50;
        const ARROW_SPEED = 0.03;

        // --- Game State ---
        let player, jumpsLeft, currentLevel, platforms, arrowAngle, onGround, selectedTopic;
        let arrowDirection = 1;
        let gamePaused = true; // Start paused
        let lastQuizTime = 0;
        let quizCooldown = 3000; // 3 seconds cooldown between quizzes
        
        // --- Quiz Topics Database ---
        let quizTopics = {};
        
async function load_data() {
    try {
        const response = await fetch('../vocab.json'); // Adjust path (e.g., '../vocab.json') if needed
        if (!response.ok) throw new Error("Network response was not ok");
        return await response.json(); 
    } catch (error) {
        console.error('Error loading question bank:', error);
        return null; 
    }
}

// 2. Build the checkboxes
async function initMenu() {
    // Load the JSON into our global variable
    quizTopics = await load_data();

    if (!quizTopics) {
        console.log('Failed to load quiz topics. Cannot initialize menu.');
        return;
    }
}
initMenu();




        // --- Level Design ---
        const levels = [ /* ... Level data remains unchanged ... */ { startX:100,startY:450,platforms:[{x:50,y:500,width:150,height:20},{x:300,y:400,width:100,height:20},{x:500,y:300,width:100,height:20},{x:650,y:200,width:100,height:20,isGoal:true},]},{startX:100,startY:450,platforms:[{x:50,y:500,width:150,height:20},{x:250,y:450,width:50,height:20},{x:400,y:350,width:100,height:20},{x:250,y:250,width:50,height:20},{x:450,y:150,width:100,height:20},{x:650,y:100,width:100,height:20,isGoal:true},]},{startX:100,startY:550,platforms:[{x:50,y:580,width:150,height:20},{x:250,y:450,width:120,height:20,isMoving:true,moveSpeed:1.2,moveRange:150,startX:250},{x:600,y:350,width:100,height:20},{x:400,y:250,width:80,height:20},{x:150,y:150,width:100,height:20,isGoal:true},]  },
  {
    "startX": 100,
    "startY": 100,
    "platforms": [
      { "x": 50, "y": 150, "width": 150, "height": 20 },
      { "x": 250, "y": 200, "width": 50, "height": 20, "isMoving": true, "moveSpeed": 3.0, "moveRange": 400, "startX": 250 },
      { "x": 250, "y": 300, "width": 50, "height": 20, "isMoving": true, "moveSpeed": 3.5, "moveRange": 400, "startX": 250 },
      { "x": 50, "y": 400, "width": 50, "height": 20, "isMoving": true, "moveSpeed": 2.0, "moveRange": 400, "startX": 50 },
      { "x": 250, "y": 475, "width": 50, "height": 20, "isMoving": true, "moveSpeed": 4.0, "moveRange": 400, "startX": 250 },
      { "x": 250, "y": 550, "width": 50, "height": 20, "isMoving": true, "moveSpeed": 2.5, "moveRange": 400, "startX": 250 },
      { "x": 550, "y": 580, "width": 50, "height": 20, "isGoal": true }
    ]
  } ];

        // --- Game Initialization ---
        function init() {
            canvas.width = 800;
            canvas.height = 600;
            showTopicModal();
            gameLoop(); // Start the loop, but it will be paused
        }

        function startGame() {
            gamePaused = false;
            arrowAngle = -Math.PI / 4;
            currentLevel = 0;
            player = { x: 0, y: 0, vx: 0, vy: 0, radius: 15 };
            jumpsLeft = 3;
            onGround = false;
            loadLevel(currentLevel);
            updateUI();
        }
        
        function loadLevel(levelIndex) {
            const level = levels[levelIndex];
            player.x = level.startX;
            player.y = level.startY;
            player.vx = 0;
            player.vy = 0;
            platforms = JSON.parse(JSON.stringify(level.platforms));
            levelDisplay.textContent = `Level: ${levelIndex + 1}`;
        }
        
        let gameLoopId;
        function gameLoop() {
            if (!gamePaused) {
                update();
            }
            draw();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // --- Game Logic ---
        function update() {
            platforms.forEach(p => {
                if (p.isMoving) {
                    if (p.direction === undefined) p.direction = 1;
                    p.x += p.moveSpeed * p.direction;
                    if (p.x >= p.startX + p.moveRange || p.x <= p.startX) {
                        p.direction *= -1;
                    }
                }
            });

            if (onGround) {
                arrowAngle += ARROW_SPEED * arrowDirection;
                if (arrowAngle >= 0) { arrowAngle = 0; arrowDirection = -1; } 
                else if (arrowAngle <= -Math.PI) { arrowAngle = -Math.PI; arrowDirection = 1; }
            }

            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;
            player.vx *= 0.98;
            onGround = false;

            platforms.forEach(p => {
                if (player.x > p.x - player.radius && player.x < p.x + p.width + player.radius &&
                    player.y > p.y - player.radius && player.y < p.y + p.height && player.vy > 0) {
                    player.y = p.y - player.radius;
                    player.vy = 0;
		    player.vx = 0;
                    onGround = true;
                    if (p.isMoving) {
                        player.x += p.moveSpeed * p.direction;
                        player.vx = 0;
                    }
                    if (p.isGoal) levelUp();
                }
            });

            if (player.y > canvas.height + player.radius) {
                loadLevel(currentLevel);
            }
        }

        function jump() {
            if (onGround && jumpsLeft > 0) {
                player.vy = Math.sin(arrowAngle) * JUMP_POWER;
                player.vx = Math.cos(arrowAngle) * JUMP_POWER;
                jumpsLeft--;
                onGround = false;
                updateUI();
            }
        }

        function levelUp() {
            currentLevel++;
            if (currentLevel >= levels.length) {
                showMessage("YOU WIN!");
                gamePaused = true;
                setTimeout(init, 3000);
            } else {
                showMessage(`Level ${currentLevel + 1}`);
                setTimeout(()=> messageBox.classList.add('hidden'), 1500);
                loadLevel(currentLevel);
            }
        }

        // --- Drawing ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw placeholder elements if game hasn't started
            if (!player) {
                drawPlatformsPlaceholder();
            } else {
                drawPlayer();
                drawPlatforms();
                if (onGround) drawArrow();
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#BF40BF';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlatforms() {
            platforms.forEach(p => {
                if (p.isGoal) ctx.fillStyle = '#4ade80';
                else if (p.isMoving) ctx.fillStyle = '#f87171';
                else ctx.fillStyle = '#60a5fa';
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });
        }
        
        function drawPlatformsPlaceholder() {
            const p = levels[0].platforms; // Just draw level 1 platforms
             p.forEach(p => {
                if (p.isGoal) ctx.fillStyle = '#4ade80';
                else ctx.fillStyle = '#60a5fa';
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });
        }

        function drawArrow() {
            const endX = player.x + Math.cos(arrowAngle) * ARROW_LENGTH;
            const endY = player.y + Math.sin(arrowAngle) * ARROW_LENGTH;
            ctx.strokeStyle = '#fef08a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }

        function updateUI() {
            jumpsDisplay.textContent = `Jumps: ${jumpsLeft}`;
        }
        
        function showMessage(msg) {
             messageText.textContent = msg;
             messageBox.classList.remove('hidden');
        }

        // --- Modal Logic ---
        function showTopicModal() {
            messageBox.classList.add('hidden'); // Hide any existing messages
            topicButtonsContainer.innerHTML = ''; // Clear old buttons
            Object.keys(quizTopics).forEach(key => {
                const topic = quizTopics[key];
                const button = document.createElement('button');
                button.className = 'w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base whitespace-normal';
                button.textContent = topic.title;
                button.onclick = () => selectTopic(key);
                topicButtonsContainer.appendChild(button);
            });
            topicModal.classList.add('active');
        }

        function selectTopic(topicKey) {
            selectedTopic = topicKey;
            topicModal.classList.remove('active');
            startGame();
        }

        function showGifModal() {
            const currentTime = Date.now();
            if (currentTime - lastQuizTime < quizCooldown) {
                const remainingTime = Math.ceil((quizCooldown - (currentTime - lastQuizTime)) / 1000);
                showMessage(`Quiz cooldown: ${remainingTime}s remaining`);
                setTimeout(() => messageBox.classList.add('hidden'), 1500);
                return;
            }
            
            lastQuizTime = currentTime;
            gamePaused = true;
            const topic = quizTopics[selectedTopic];
            const currentQuestion = topic.questions[Math.floor(Math.random() * topic.questions.length)];
            
            gifImage.src = currentQuestion.image;
            gifQuestion.textContent = currentQuestion.question;
            
            optionBtns.forEach((btn, index) => {
                btn.textContent = currentQuestion.options[index];
                btn.onclick = () => handleAnswer(index === currentQuestion.correct);
            });

            gifModal.classList.add('active');
        }

        function handleAnswer(isCorrect) {
            gifModal.classList.remove('active');
            if (isCorrect) {
                jumpsLeft += 3;
                updateUI();
                 showMessage("Correct! +3 Jumps");
            } else {
                 showMessage("Wrong Answer!");
            }
             setTimeout(()=> messageBox.classList.add('hidden'), 1500);
            
            setTimeout(() => {
                gamePaused = false;
            }, 500);
        }

        // --- Event Listeners ---
        window.addEventListener('load', init);
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Always prevent default spacebar behavior
                if (onGround && !gamePaused && jumpsLeft > 0) {
                    jump();
                }
            }
        });

        function shouldIgnoreTap(target) {
            return !!target.closest('#quiz-button') || !!target.closest('#topic-modal') || !!target.closest('#gif-modal');
        }

        function handleTapToJump(e) {
            if (shouldIgnoreTap(e.target)) return;
            if (onGround && !gamePaused && jumpsLeft > 0) {
                jump();
            }
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') handleTapToJump(e);
        });

        window.addEventListener('touchstart', (e) => {
            handleTapToJump(e);
        });

        quizButton.addEventListener('click', () => {
            if (!gamePaused) {
                showGifModal();
            }
        }); 
    </script>
</body>
</html>
