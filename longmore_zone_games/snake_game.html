<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake GIF Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        #game-container, #topic-selector {
            position: relative;
	    border: 4px solid #4ade80;
            border-radius: 8px;
            box-shadow: 0 0 20px #4ade80;
        }
        canvas {
            background-color: #000;
        }
        #gif-modal {
            position: absolute;
	    top: 50%;
	    left: 50%;
            background-color: rgba(26, 26, 26, 0.9);
            border: 4px solid #4ade80;
            border-radius: 12px;
            box-shadow: 0 0 30px #4ade80, 0 0 50px #4ade80 inset;
            color: #ffffff;
            z-index: 10;
            transition: all 0.3s ease-in-out;
            transform: translate(-50%, -50%) scale(0.9);;
            opacity: 0;
            pointer-events: none;
        }
        #gif-modal.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        #gif-modal button, #topic-selector button {
            transition: all 0.2s ease;
            box-shadow: 0 4px #15803d;
        }
        #gif-modal button:active, #topic-selector button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #15803d;
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: #4ade80;
            text-shadow: 2px 2px #000;
        }
         #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8);
            color: #4ade80;
            padding: 2rem 3rem;
            border-radius: 1rem;
            border: 2px solid #4ade80;
            text-align: center;
            z-index: 20;
            font-size: 1.5rem;
            box-shadow: 0 0 20px #4ade80;
        }
    </style>
</head>
<body>
    <div id="topic-selector" class="w-11/12 max-w-lg p-8 rounded-lg text-center bg-gray-900">
        <h1 class="text-2xl md:text-3xl mb-6 text-green-400">Select a Topic</h1>
        <div id="topic-buttons-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-96 overflow-y-auto">
            <!-- Buttons will be injected here by JS -->
        </div>
    </div>

    <div id="game-container" class="hidden">
        <div id="score-display">SCORE: 0</div>
        <canvas id="gameCanvas"></canvas>
        <div id="gif-modal" class="w-11/12 max-w-md p-6 rounded-lg text-center">
            <h2 class="text-xl md:text-2xl mb-4 text-green-400" id="gif-question">What is this?</h2>
            <img id="gif-image" src="" alt="Challenge GIF" class="w-full h-48 object-contain mx-auto mb-6 rounded-md border-2 border-green-400">
            <div class="grid grid-cols-2 gap-4">
                <button id="option0" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option1" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option2" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
                <button id="option3" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg text-sm md:text-base"></button>
            </div>
        </div>
        <div id="message-box" class="hidden">
            <p id="message-text"></p>
            <button id="restart-button" class="mt-4 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded">New Game</button>
        </div>
    </div>

    <script>
        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const modal = document.getElementById('gif-modal');
        const gifImage = document.getElementById('gif-image');
        const gifQuestion = document.getElementById('gif-question');
        const optionBtns = [
            document.getElementById('option0'),
            document.getElementById('option1'),
            document.getElementById('option2'),
            document.getElementById('option3'),
        ];
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');
        const restartButton = document.getElementById('restart-button');
        const topicSelector = document.getElementById('topic-selector');
        const topicButtonsContainer = document.getElementById('topic-buttons-container');
        const gameContainer = document.getElementById('game-container');
        
        let gridSize = 40;
        let canvasSize;

        let snake = [{ x: 10, y: 10 }];
        let food = {};
        let score = 0;
        let dx = 1;
        let dy = 0;
        let changingDirection = false;
        let gamePaused = false;
        let gameOver = false;
        let currentQuestion = null;
        let selectedTopicKey = null;


        // --- Performance & Speed Variables ---
        let lastTime = 0;
        let gameSpeed = 250; // Milliseconds per game tick
        const SPEED_PENALTY = 15; // How much faster on wrong answer
        const MIN_SPEED = 1000; // Fastest possible speed (lower is faster)

        // --- Quiz Topics Database ---
        let quizTopics = {};

async function load_data() {
    try {
        const response = await fetch('../vocab.json'); // Adjust path (e.g., '../vocab.json') if needed
        if (!response.ok) throw new Error("Network response was not ok");
        return await response.json(); 
    } catch (error) {
        console.error('Error loading question bank:', error);
        return null; 
    }
}

// 2. Build the checkboxes
async function initMenu() {
    // Load the JSON into our global variable
    quizTopics = await load_data();

    if (!quizTopics) {
        console.log('Failed to load quiz topics. Cannot initialize menu.');
        return;
    }
}
initMenu();

        // --- Game Initialization & State Management ---
        window.addEventListener('load', init);
        window.addEventListener('resize', setupCanvas);
        
        function init() {
            populateTopicSelector();
            showTopicSelector();
        }

        function populateTopicSelector() {
            topicButtonsContainer.innerHTML = ''; // Clear old buttons
            for (const key in quizTopics) {
                const topic = quizTopics[key];
                const button = document.createElement('button');
                button.className = 'w-full h-auto whitespace-normal break-words bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-lg text-sm md:text-base transform hover:scale-105';
                button.textContent = topic.title;
                button.onclick = () => startGame(key);
                topicButtonsContainer.appendChild(button);
            }
        }

        function showTopicSelector() {
            gameOver = true; // Stop any running game loops
            gameContainer.classList.add('hidden');
            topicSelector.classList.remove('hidden');
            messageBox.classList.add('hidden');
        }

        function startGame(topicKey) {
            topicSelector.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            selectedTopicKey = topicKey;
            
            // Reset game state
            gameOver = false;
            gamePaused = false;
            score = 0;
            scoreDisplay.textContent = 'SCORE: ' + score;
            gameSpeed = 250; // Reset game speed
            dx = 1;
            dy = 0;
            snake = [{ x: 10, y: 10 }];
            messageBox.classList.add('hidden');
            
            setupCanvas();
            requestAnimationFrame(gameLoop);
        }

        function setupCanvas() {
            const containerParent = document.body;
            const size = Math.min(containerParent.clientWidth, containerParent.clientHeight) * 0.9;
            canvasSize = Math.floor(size / gridSize) * gridSize;
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            gridSize = canvasSize / 20; // Maintain a 20x20 grid
            if(snake.length === 1) { // Only reset position at very start
                 snake = snake = [{ x: 10, y: 10 }];
            }
            if(!gameOver) {
                 generateFood();
            }
        }
        
        // --- Game Loop ---
        function gameLoop(currentTime) {
            if (gameOver) return;
            
            requestAnimationFrame(gameLoop);
            if (gamePaused) return;

            const deltaTime = currentTime - lastTime;
            if (deltaTime > gameSpeed) {
                lastTime = currentTime - (deltaTime % gameSpeed);
                changingDirection = false;
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
            }
        }

        // --- Drawing Functions ---
        function clearCanvas() {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#4ade80' : '#34d399';
                ctx.strokeStyle = '#111827';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }
        
        function drawFood() {
            ctx.fillStyle = '#f87171';
            ctx.strokeStyle = '#dc2626';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            ctx.strokeRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }

        // --- Game Logic ---
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (checkCollision(head)) {
                gameOver = true;
                showMessage('GAME OVER!');
                return;
            }

            const hasEatenFood = head.x === food.x && head.y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreDisplay.textContent = 'SCORE: ' + score;
                showGifModal();
            } else {
                snake.pop();
            }
        }
        
        function generateFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize));
            food.y = Math.floor(Math.random() * (canvas.height / gridSize));
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }
        
        function checkCollision(head) {
            for (let i = 4; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            const hitLeftWall = head.x < 0;
            const hitRightWall = head.x >= canvas.width / gridSize;
            const hitTopWall = head.y < 0;
            const hitBottomWall = head.y >= canvas.height / gridSize;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }
        
        function changeDirection(event) {
            if (changingDirection || gamePaused) return;
            changingDirection = true;
            const keyPressed = event.key;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === "ArrowLeft" || keyPressed.toLowerCase() === "a") && !goingRight) {
                dx = -1; dy = 0;
            } else if ((keyPressed === "ArrowUp" || keyPressed.toLowerCase() === "w") && !goingDown) {
                dx = 0; dy = -1;
            } else if ((keyPressed === "ArrowRight" || keyPressed.toLowerCase() === "d") && !goingLeft) {
                dx = 1; dy = 0;
            } else if ((keyPressed === "ArrowDown" || keyPressed.toLowerCase() === "s") && !goingUp) {
                dx = 0; dy = 1;
            }
        }
        
        // --- GIF Modal Logic ---
        function showGifModal() {
            gamePaused = true;
            const topic = quizTopics[selectedTopicKey];
            currentQuestion = topic.questions[Math.floor(Math.random() * topic.questions.length)];
            
            gifImage.src = currentQuestion.image;
            gifQuestion.textContent = currentQuestion.question;
            
            currentQuestion.options.forEach((option, index) => {
                if(optionBtns[index]) {
                    optionBtns[index].textContent = option;
                }
            });

            modal.classList.add('active');
        }

        function handleAnswer(selectedIndex) {
            if (selectedIndex === currentQuestion.correct) {
                // Correct answer
                modal.classList.remove('active');
                generateFood(); // Generate new food
                setTimeout(() => { gamePaused = false; }, 1000);
            } else {
                // Incorrect answer: Go faster, no points, no growth!
                score -= 10;
                scoreDisplay.textContent = 'SCORE: ' + score;

                if (snake.length > 1) { snake.pop(); } // Remove the length gain
                gameSpeed = Math.max(MIN_SPEED, gameSpeed - SPEED_PENALTY); // Increase speed

                modal.classList.remove('active');
                generateFood(); // Still need new food to appear
                setTimeout(() => { gamePaused = false; }, 1000);
            }
        }
        
        function showMessage(msg) {
             messageText.textContent = msg;
             messageBox.classList.remove('hidden');
        }

        // --- Event Listeners ---
        document.addEventListener('keydown', changeDirection);
        optionBtns.forEach((btn, index) => {
            btn.addEventListener('click', () => handleAnswer(index));
        });
        restartButton.addEventListener('click', showTopicSelector);

    </script>
</body>
</html>
