<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Dispatch - 2D Grid Runner</title>
    <style>
        :root {
            --tile-size: 60px;
            --road-color: #2c3e50;
            --grass-color: #27ae60;
            --building-color: #555; 
            --player-color: transparent; /* Changed to transparent so the PNG looks better */
            --sidebar-width: 320px;
        }

        body {
            margin: 0;
            display: flex;
            background: #1a1a1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: #222;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #34495e;
            box-sizing: border-box;
            z-index: 20;
        }

        #game-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            position: relative;
            overflow: auto;
        }

        #grid {
            display: grid;
            border: 5px solid #34495e;
            background: var(--road-color);
            position: relative;
            margin: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            color: white;
            transition: background-color 0.5s ease;
        }

        .building { background-color: var(--building-color); border: 2px solid #34495e; }
        .road { background-color: var(--road-color); }
        
        #player {
            width: calc(var(--tile-size) - 10px);
            height: calc(var(--tile-size) - 10px);
            /* REPLACE THE URL BELOW WITH YOUR PNG PATH */
            background-image: url('URL_TO_YOUR_IMAGE.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: absolute;
            transition: all 0.1s ease-out;
            z-index: 10;
            margin: 5px; 
            pointer-events: none;
        }

        #gps-card {
            background: linear-gradient(145deg, #333, #222);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid #444;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #gps-img {
            width: 220px;
            height: 220px;
            background: #000;
            border-radius: 15px;
            object-fit: cover;
            border: 3px solid #444;
            display: block;
            margin: 0 auto;
        }

        #target-name {
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #quest-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        #stats {
            background: #111;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            border: 1px solid #333;
            margin-top: 10px;
        }

        .location-item {
            padding: 12px;
            margin: 8px 0;
            background: #333;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-style: italic;
            color: #aaa;
            border-left: 4px solid transparent;
        }

        .revealed {
            font-style: normal;
            color: white;
            background: #27ae60;
            border-left: 4px solid #2ecc71;
            opacity: 1;
        }

        #modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .btn:hover { transform: scale(1.05); }

        @media (max-width: 800px) {
            body { flex-direction: column; overflow: auto; }
            #sidebar { 
                width: 100%; 
                min-width: 100%; 
                border-right: none; 
                border-bottom: 4px solid #34495e; 
                height: auto;
                max-height: 400px;
            }
            #gps-img { width: 140px; height: 140px; }
            #gps-card { padding: 10px; margin-bottom: 10px; }
            #game-container { padding: 20px; min-height: 500px; }
            #target-name { font-size: 1rem; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top: 0; color: #f1c40f;">City Dispatch</h2>
        
        <div id="gps-card">
            <img id="gps-img" src="" alt="GPS">
            <div id="target-name" style="font-weight:bold; color:#f1c40f;">Locating Target...</div>
        </div>

        <div id="quest-list">
            <div style="font-size: 0.9em; color: #888; margin-bottom: 10px; font-weight: bold;">DELIVERY LOG:</div>
            <div id="locations-container"></div>
        </div>

        <div id="stats">
            Moves: <span id="move-count" style="color: #f1c40f;">0</span>
        </div>
    </div>

    <div id="game-container">
        <div id="grid">
            <div id="player"></div>
        </div>
    </div>

    <div id="modal">
        <h1>Shift Complete!</h1>
        <p>All locations identified and deliveries confirmed.</p>
        <div id="final-stats" style="font-size: 1.5rem; margin: 20px 0; font-weight: bold;"></div>
        <button class="btn" onclick="location.reload()">Start New Day</button>
    </div>

    <script>
        const GRID_SIZE = 11;
        const TILE_SIZE = 60;
        
        const GPS_GIFS = {
            STRAIGHT: "https://media.gimkit.com/image/upload/f_auto,fl_lossy,q_auto/v1767901183/bl96ogi1ymreczdiykq5.gif",
            LEFT: "https://media.gimkit.com/image/upload/f_auto,fl_lossy,q_auto/v1767901279/qxejyjiqfqrjmi7q4flr.gif",
            RIGHT: "https://media.gimkit.com/image/upload/f_auto,fl_lossy,q_auto/v1767901316/mmmgm1agaaasstbui84d.gif",
            ARRIVED: "https://media.gimkit.com/image/upload/f_auto,fl_lossy,q_auto/v1767901119/vu0c0af3n08ea4vwru68.gif"
        };

        const LOCATION_POOL = [
            { name: "Coffee Shop", color: "#e67e22" },
            { name: "Public Library", color: "#3498db" },
            { name: "City Hospital", color: "#e74c3c" },
            { name: "Post Office", color: "#9b59b6" },
            { name: "Town Hall", color: "#1abc9c" },
            { name: "Movie Theater", color: "#d35400" },
            { name: "Ice Cream Parlor", color: "#ff9ff3" },
            { name: "Police Station", color: "#2980b9" }
        ];

        let LOCATIONS = [];
        let playerPos = { x: 5, y: 5 };
        let playerFacing = { x: 0, y: -1 }; 
        let currentTargetIndex = 0;
        let moves = 0;
        let lastGps = "";

        function setupRandomLocations() {
            const shuffledPool = [...LOCATION_POOL].sort(() => Math.random() - 0.5);
            const buildingCoords = [];
            for (let y = 1; y < GRID_SIZE; y += 2) {
                for (let x = 1; x < GRID_SIZE; x += 2) {
                    buildingCoords.push({ x, y });
                }
            }
            buildingCoords.sort(() => Math.random() - 0.5);

            LOCATIONS = shuffledPool.slice(0, 5).map((loc, i) => ({
                ...loc,
                x: buildingCoords[i].x,
                y: buildingCoords[i].y,
                revealed: false
            }));
        }

        function init() {
            setupRandomLocations();
            const gridEl = document.getElementById('grid');
            const playerEl = document.getElementById('player');
            gridEl.innerHTML = '';
            gridEl.appendChild(playerEl);
            
            gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, ${TILE_SIZE}px)`;
            gridEl.style.gridTemplateRows = `repeat(${GRID_SIZE}, ${TILE_SIZE}px)`;
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${x}-${y}`;
                    
                    if (x % 2 !== 0 && y % 2 !== 0) {
                        tile.classList.add('building');
                        tile.innerText = "?";
                    } else {
                        tile.classList.add('road');
                    }
                    gridEl.appendChild(tile);
                }
            }

            renderLocations();
            updatePlayer();
            updateGPS();
            
            window.addEventListener('keydown', handleKey);
        }

        function renderLocations() {
            const container = document.getElementById('locations-container');
            container.innerHTML = '';
            LOCATIONS.forEach((loc, i) => {
                const div = document.createElement('div');
                const isRevealed = i < currentTargetIndex;
                div.className = `location-item ${isRevealed ? 'revealed' : ''}`;
                
                const label = isRevealed ? loc.name : "???";
                const status = isRevealed ? "✓" : "PENDING";
                
                div.innerHTML = `<span>${label}</span> <span>${status}</span>`;
                container.appendChild(div);
            });
            
            const targetNode = LOCATIONS[currentTargetIndex];
            document.getElementById('target-name').innerText = targetNode ? "FOLLOW NAV" : "ALL ARRIVED";
        }

        function revealBuilding(loc) {
            const tile = document.getElementById(`tile-${loc.x}-${loc.y}`);
            if (tile) {
                tile.style.backgroundColor = loc.color;
                tile.innerText = loc.name;
                tile.style.boxShadow = `inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px ${loc.color}`;
            }
        }

        function updatePlayer() {
            const playerEl = document.getElementById('player');
            playerEl.style.left = `${playerPos.x * TILE_SIZE}px`;
            playerEl.style.top = `${playerPos.y * TILE_SIZE}px`;
            
            let deg = 0;
            if (playerFacing.x === 1) deg = 90;
            if (playerFacing.x === -1) deg = 270;
            if (playerFacing.y === 1) deg = 180;
            playerEl.style.transform = `rotate(${deg}deg)`;
        }

        function handleKey(e) {
            let dx = 0, dy = 0;
            if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
            else if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
            else if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
            else if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;

            if (dx === 0 && dy === 0) return;

            const nextX = playerPos.x + dx;
            const nextY = playerPos.y + dy;

            if (nextX >= 0 && nextX < GRID_SIZE && nextY >= 0 && nextY < GRID_SIZE) {
                if (nextX % 2 === 0 || nextY % 2 === 0) {
                    playerPos.x = nextX;
                    playerPos.y = nextY;
                    playerFacing = { x: dx, y: dy };
                    moves++;
                    document.getElementById('move-count').innerText = moves;
                    updatePlayer();
                    checkArrival();
                    updateGPS();
                    e.preventDefault();
                }
            }
        }

        function checkArrival() {
            const target = LOCATIONS[currentTargetIndex];
            if (!target) return;

            const dist = Math.abs(playerPos.x - target.x) + Math.abs(playerPos.y - target.y);
            if (dist === 1) {
                revealBuilding(target);
                currentTargetIndex++;
                renderLocations();
                if (currentTargetIndex >= LOCATIONS.length) {
                    document.getElementById('modal').style.display = 'block';
                    document.getElementById('final-stats').innerText = `${moves} Moves Total`;
                }
            }
        }

        function findPath(start, end) {
            const queue = [{ x: start.x, y: start.y, path: [] }];
            const visited = new Set([`${start.x},${start.y}`]);

            while (queue.length > 0) {
                const current = queue.shift();
                
                if (Math.abs(current.x - end.x) + Math.abs(current.y - end.y) === 1) {
                    return current.path;
                }

                const dirs = [{x:0,y:-1}, {x:0,y:1}, {x:-1,y:0}, {x:1,y:0}];
                for (const d of dirs) {
                    const nx = current.x + d.x;
                    const ny = current.y + d.y;
                    const key = `${nx},${ny}`;
                    
                    if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && !visited.has(key)) {
                        if (nx % 2 === 0 || ny % 2 === 0) {
                            visited.add(key);
                            queue.push({ x: nx, y: ny, path: [...current.path, d] });
                        }
                    }
                }
            }
            return [];
        }

        function updateGPS() {
            const target = LOCATIONS[currentTargetIndex];
            const img = document.getElementById('gps-img');
            
            if (!target) {
                if (img.src !== GPS_GIFS.ARRIVED) img.src = GPS_GIFS.ARRIVED;
                return;
            }

            const path = findPath(playerPos, target);
            if (path.length === 0) {
                if (img.src !== GPS_GIFS.ARRIVED) img.src = GPS_GIFS.ARRIVED;
                return;
            }

            const nextMove = path[0];
            const dot = playerFacing.x * nextMove.x + playerFacing.y * nextMove.y;
            const cross = playerFacing.x * nextMove.y - playerFacing.y * nextMove.x;

            let src = GPS_GIFS.STRAIGHT;
            if (dot === 1) src = GPS_GIFS.STRAIGHT;
            else if (cross === 1) src = GPS_GIFS.RIGHT;
            else if (cross === -1) src = GPS_GIFS.LEFT;
            else src = GPS_GIFS.LEFT;

            if (src !== lastGps) {
                img.src = src;
                lastGps = src;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
